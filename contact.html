<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Contact</h1>
</header>

<section class="contact">
    <h2>Envoyez-nous un message</h2>

    <form>
        <label>Nom</label>
        <input type="text" placeholder="Votre nom" required>

        <label>Email</label>
        <input type="email" placeholder="Votre email" required>

        <label>Message</label>
        <textarea rows="5" placeholder="Votre message" required></textarea>

        <button type="submit">Envoyer</button>
    </form>

    <div class="infos">
        <h3>Nos coordonnées</h3>
        <p><strong>Email :</strong> contact@portfolio.com</p>
        <p><strong>Téléphone :</strong> +226 XX XX XX XX</p>
        <p><strong>Facebook :</strong> Portfolio G10</p>
        <p><strong>Instagram :</strong> @portfolio_g10</p>
        <p><strong>LinkedIn :</strong> Portfolio G10</p>
    </div>
</section>

<footer>
    <p>&copy; 2026 Portfolio G10 - Tous droits réservés.</p>
</footer>

</body>
</html>
