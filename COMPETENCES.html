<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style01.css">
    <title>competence</title>
</head>

<body>
    <section id="competences">
        <h2>Nos Compétence</h2>

        <div class="competences-container">

            <!-- Compétences techniques -->
            <div class="categorie">
                <h3>Langages de programmation</h3>

                <div class="competence">
                    <span class="label">HTML / CSS</span>
                    <div class="barre">
                        <div class="progression" style="width: 90%;">90%</div>
                    </div>
                </div>

                <div class="competence">
                    <span class="label">Java</span>
                    <div class="barre">
                        <div class="progression" style="width: 75%;">75%</div>
                    </div>
                </div>

                <div class="competence">
                    <span class="label">Python</span>
                    <div class="barre">
                        <div class="progression" style="width: 65%;">65%</div>
                    </div>
                </div>

                <div class="competence">
                    <span class="label">JavaScript</span>
                    <div class="barre">
                        <div class="progression" style="width: 60%;">60%</div>
                    </div>
                </div>
            </div>

            <!-- Outils -->
            <div class="categorie">
                <h3>Outils & Technologies</h3>

                <div class="competence">
                    <span class="label">Git / GitHub</span>
                    <div class="barre">
                        <div class="progression" style="width: 80%;">80%</div>
                    </div>
                </div>

                <div class="competence">
                    <span class="label">VS Code</span>
                    <div class="barre">
                        <div class="progression" style="width: 85%;">85%</div>
                    </div>
                </div>

                <div class="competence">
                    <span class="label">Linux / Bash</span>
                    <div class="barre">
                        <div class="progression" style="width: 55%;">55%</div>
                    </div>
                </div>
            </div>

        </div>
    </section>
</body>

</html>
